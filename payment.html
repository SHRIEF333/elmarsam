<form class="payment-form" id="paymentForm">

    <div class="form-group">
        <label>اسم المشترك *</label>
        <input type="text" id="paymentPersonName" required placeholder="أدخل اسمك الكامل">
    </div>

    <div class="form-group">
        <label>اختر الكورس *</label>
        <select id="paymentCourseName" required>
            <option value="">-- اختر كورس --</option>
            <option value="🎨 مستوى اول (4 حصص) - 100 ج">🎨 مستوى اول (4 حصص) - 100 ج</option>
            <option value="🎨 مستوى ثاني (4 حصص) - 120 ج">🎨 مستوى ثاني (4 حصص) - 120 ج</option>
            <option value="🎨 مستوى ثالث (4 حصص) - 120 ج">🎨 مستوى ثالث (4 حصص) - 120 ج</option>
            <option value="🎨 مستوى متقدم واساسيات بورتريه (4 حصص) - 150 ج">🎨 مستوى متقدم واساسيات بورتريه (4 حصص) - 150 ج</option>
        </select>
    </div>

    <div class="form-group">
        <label>المبلغ *</label>
        <input type="number" id="paymentAmount" required placeholder="المبلغ">
    </div>

    <div class="form-group">
        <label>رقم الهاتف (اختياري)</label>
        <input type="tel" id="paymentPhone" placeholder="رقم الهاتف">
    </div>

    <!-- Payment Methods -->
    <div class="payment-methods">
        <label>طريقة الدفع *</label>

        <div class="method-options">

            <div class="method-option" data-value="vodafone">
                <input type="radio" name="paymentMethod" value="vodafone">
                <div class="method-label">
                    <span class="method-icon">📱</span>
                    فودافون كاش
                </div>
            </div>

            <div class="method-option" data-value="instapay">
                <input type="radio" name="paymentMethod" value="instapay">
                <div class="method-label">
                    <span class="method-icon">🏪</span>
                    إنستاباي
                </div>
            </div>

            <div class="method-option" data-value="fawry">
                <input type="radio" name="paymentMethod" value="fawry">
                <div class="method-label">
                    <span class="method-icon">🏠</span>
                    فوري
                </div>
            </div>

            <div class="method-option" data-value="card">
                <input type="radio" name="paymentMethod" value="card">
                <div class="method-label">
                    <span class="method-icon">💳</span>
                    بطاقة
                </div>
            </div>

        </div>
    </div>

    <!-- Summary -->
    <div class="payment-summary">

        <div class="summary-row">
            <span>الكورس:</span>
            <span id="summaryCourse">--</span>
        </div>

        <div class="summary-row">
            <span>المبلغ:</span>
            <span id="summaryAmount">--</span>
        </div>

        <div class="summary-row">
            <span>طريقة الدفع:</span>
            <span id="summaryMethod">--</span>
        </div>

        <div class="summary-row total">
            <span>الإجمالي:</span>
            <span id="summaryTotal">0 جنيه</span>
        </div>

    </div>

    <button type="submit" class="payment-btn-submit">
        ✅ تأكيد الدفع
    </button>

</form>
